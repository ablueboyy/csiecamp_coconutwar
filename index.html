<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🥥 COCONUT WARS · 版本選擇</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: "Noto Sans TC", sans-serif; color: #3a3226;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; padding: 40px 20px;
      background: linear-gradient(180deg, #bff0f7 0%, #7fd0e6 55%, #3aa9cf 100%);
    }
    h1 { font-family: "Baloo 2"; font-size: clamp(30px, 6vw, 52px); color: #fff; margin: 0;
      text-shadow: 0 3px 0 #e8503f, 0 6px 16px rgba(0,0,0,.2); }
    h1 img { height: 0.9em; width: auto; vertical-align: -0.12em; }
    .sub { color: #eafaff; margin: -14px 0 6px; font-weight: 500; }
    .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .card {
      display: block; width: 320px; background: #fffaf0; border-radius: 22px; padding: 24px 26px;
      text-decoration: none; color: inherit; border: 3px solid #fff; box-shadow: 0 8px 24px rgba(11,70,90,.18);
      transition: transform .12s, box-shadow .12s;
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 14px 32px rgba(11,70,90,.28); }
    .ver { font-family: "Baloo 2"; font-weight: 800; font-size: 26px; color: #0b6e99; }
    .card ul { padding-left: 18px; line-height: 1.7; font-size: 14px; color: #5a5040; }
    .go { display: inline-block; margin-top: 10px; font-family: "Baloo 2"; font-weight: 700;
      background: linear-gradient(180deg, #ff8a6f, #ff6f61); color: #fff; padding: 8px 18px; border-radius: 12px; box-shadow: 0 4px 0 #e8503f; }
  </style>
</head>
<body>
  <h1>🥥 COCONUT WARS</h1>
  <p class="sub">椰子戰爭 · 工作人員後台系統</p>
  <div class="cards">
    <a class="card" href="1.0/index.html">
      <div class="ver">1.0 完整版</div>
      <ul>
        <li>金錢島 / 軍火島資源點</li>
        <li>指令：移動 / 協防 / 開城 / 進攻</li>
        <li>結盟合法集合 + 四階裁決</li>
        <li>兵營利息、低兵力救濟</li>
      </ul>
      <span class="go">進入 1.0 ▸</span>
    </a>
    <a class="card" href="2.0/index.html">
      <div class="ver">2.0 開墾版</div>
      <ul>
        <li>無資源點，簡化跨隊協調</li>
        <li>指令：開墾 / 移動 / 攻擊</li>
        <li>攻擊同額互相抵銷至唯一最高者</li>
        <li>每回合 2 島豐收、最後一回合全島豐收 ×1.5</li>
      </ul>
      <span class="go">進入 2.0 ▸</span>
    </a>
  </div>
</body>
</html>
